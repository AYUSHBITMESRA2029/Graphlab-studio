<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="curve1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="curve2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="96"/>

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="1.2" opacity="0.5">
    <line x1="80" y1="128" x2="432" y2="128"/>
    <line x1="80" y1="206" x2="432" y2="206"/>
    <line x1="80" y1="284" x2="432" y2="284"/>
    <line x1="80" y1="362" x2="432" y2="362"/>
    <line x1="168" y1="80" x2="168" y2="432"/>
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="344" y1="80" x2="344" y2="432"/>
  </g>

  <!-- Axes -->
  <line x1="80" y1="256" x2="440" y2="256" stroke="#64748b" stroke-width="2.5"/>
  <line x1="256" y1="72" x2="256" y2="440" stroke="#64748b" stroke-width="2.5"/>
  <!-- Axis arrows -->
  <polygon points="440,256 428,250 428,262" fill="#64748b"/>
  <polygon points="256,72 250,84 262,84" fill="#64748b"/>

  <!-- Sine wave (main curve with glow) -->
  <path d="M 80 256 C 110 256, 124 120, 168 120 C 212 120, 212 256, 256 256 C 300 256, 300 392, 344 392 C 388 392, 402 256, 432 256"
        stroke="url(#curve1)" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#glow1)"/>

  <!-- Parabola-like curve (secondary) -->
  <path d="M 100 400 Q 200 80, 420 180"
        stroke="url(#curve2)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="12 6" filter="url(#glow2)" opacity="0.7"/>

  <!-- Data points on sine -->
  <circle cx="168" cy="120" r="7" fill="#06b6d4" opacity="0.9"/>
  <circle cx="256" cy="256" r="7" fill="#3b82f6" opacity="0.9"/>
  <circle cx="344" cy="392" r="7" fill="#8b5cf6" opacity="0.9"/>

  <!-- Small "GL" text hint -->
  <text x="410" y="108" font-family="Segoe UI, sans-serif" font-weight="800" font-size="48" fill="#0ea5e9" opacity="0.25">G</text>
</svg>
