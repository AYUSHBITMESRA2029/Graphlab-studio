<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>GraphLab Studio</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a" />
    <meta name="application-name" content="GraphLab Studio" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon-180.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  </head>
  <body>
    <div id="splashScreen" class="splash-screen">
      <div class="splash-logo">GraphLab</div>
      <div class="splash-quote">"Where equations come to life."</div>
    </div>

    <main class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">GL</div>
          <div>
            <h1>GraphLab Studio</h1>
            <p>Science graph workspace</p>
          </div>
        </div>

        <section class="control-section">
          <label for="streamSelect">Stream</label>
          <select id="streamSelect">
            <option value="math">Mathematics</option>
            <option value="physics">Physics</option>
            <option value="electrical">Electrical Engineering</option>
            <option value="science">General Science</option>
            <option value="data">Data Analysis</option>
          </select>
        </section>

        <section class="control-section">
          <span class="field-label">Theme</span>
          <div class="theme-grid" aria-label="Theme presets">
            <button class="theme-swatch active" type="button" data-theme="light">
              Light
            </button>
            <button class="theme-swatch" type="button" data-theme="dark">
              Dark
            </button>
            <button class="theme-swatch" type="button" data-theme="pink">
              Pink
            </button>
            <button class="theme-swatch" type="button" data-theme="mint">
              Mint
            </button>
          </div>
          <div class="color-grid">
            <label>
              Theme colour
              <input id="themeColor" type="color" value="#13a89e" />
            </label>
            <label>
              Cursor
              <input id="cursorColor" type="color" value="#172033" />
            </label>
            <label>
              Values
              <input id="valueColor" type="color" value="#172033" />
            </label>
          </div>
        </section>

        <section class="control-section">
          <label for="promptInput">Graph request</label>
          <textarea
            id="promptInput"
            rows="3"
            placeholder="Example: plot y = sin(x) + 0.4x from -10 to 10"
          ></textarea>
          <button class="secondary-button" id="interpretButton" type="button">
            Interpret request
          </button>
        </section>

        <section class="control-section">
          <span class="field-label">Angle mode</span>
          <div class="segmented" role="tablist" aria-label="Angle mode">
            <button class="segment active" type="button" data-angle="rad">Radians</button>
            <button class="segment" type="button" data-angle="deg">Degrees</button>
          </div>
        </section>

        <section class="control-section">
          <span class="field-label">Graph Categories</span>
          
          <button class="category-header active" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            📐 Mathematics
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content active">
            <div class="segmented" role="tablist">
              <button class="segment active" type="button" data-mode="equation">Equation 2D</button>
              <button class="segment" type="button" data-mode="parametric">Parametric</button>
              <button class="segment" type="button" data-mode="polar">Polar</button>
              <button class="segment" type="button" data-mode="calculus">Calculus Tools</button>
              <button class="segment" type="button" data-mode="surface">3D Surface</button>
            </div>
          </div>

          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            🧮 Linear Algebra
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="matrix">Matrix Transforms</button>
              <button class="segment" type="button" data-mode="vector">Vectors (2D/3D)</button>
            </div>
          </div>

          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            ⚡ Electrical Eng.
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="phasor">Phasors</button>
              <button class="segment" type="button" data-mode="complex">Complex Numbers</button>
              <button class="segment" type="button" data-mode="bode">Bode Plot</button>
              <button class="segment" type="button" data-mode="digital">Digital Logic</button>
            </div>
          </div>

          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            🎛️ Control Systems
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="transient">Transient Response</button>
            </div>
          </div>
          
          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            ⚙️ Mechanical & Physics
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="kinematics">Kinematics</button>
              <button class="segment" type="button" data-mode="mechanics">Mohr's Circle</button>
            </div>
          </div>

          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            🔥 Thermodynamics
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="thermo">PV Diagram</button>
            </div>
          </div>

          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            💻 CS & AI
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="complexity">Big-O</button>
              <button class="segment" type="button" data-mode="ai">Neural / ML</button>
            </div>
          </div>

          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            🚀 Aerospace & Ast.
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="elliptical">Orbit</button>
              <button class="segment" type="button" data-mode="hohmann">Hohmann</button>
            </div>
          </div>
          <button class="category-header" type="button" onclick="this.classList.toggle('active'); this.nextElementSibling.classList.toggle('active')">
            📊 Data & Stats
            <span class="category-icon">▶</span>
          </button>
          <div class="category-content">
            <div class="segmented" role="tablist">
              <button class="segment" type="button" data-mode="scatter">Scatter</button>
              <button class="segment" type="button" data-mode="bar">Bar Chart</button>
              <button class="segment" type="button" data-mode="semilog">Semilog</button>
            </div>
          </div>
        </section>

        <section class="control-section mode-fields active" data-fields="equation">
          <label for="equationInput">Equation</label>
          <input id="equationInput" value="sin(x) + 0.35*x" />
          <div class="range-grid">
            <label>
              x min
              <input id="xMin" type="number" value="-10" step="0.5" />
            </label>
            <label>
              x max
              <input id="xMax" type="number" value="10" step="0.5" />
            </label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="parametric">
          <label for="paramXInput">x(t)</label>
          <input id="paramXInput" value="4*cos(t)" />
          <label for="paramYInput">y(t)</label>
          <input id="paramYInput" value="2*sin(t)" />
          <div class="range-grid">
            <label>
              t min
              <input id="tMin" type="number" value="0" step="0.5" />
            </label>
            <label>
              t max
              <input id="tMax" type="number" value="6.28" step="0.5" />
            </label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="vector">
          <label for="vectorInput">Vectors: name, x, y, color</label>
          <textarea id="vectorInput" rows="5">Force A,4,3,#1f9bd1
Force B,-2,5,#f97316
Velocity,5,-2,#16a34a</textarea>
        </section>

        <section class="control-section mode-fields" data-fields="phasor">
          <label for="phasorInput">Phasors: name, magnitude, angle, color</label>
          <textarea id="phasorInput" rows="5">Voltage,230,0,#ef4444
Current,8,-35,#2563eb
Flux,120,70,#16a34a</textarea>
        </section>

        <section class="control-section mode-fields" data-fields="scatter">
          <label for="scatterInput">Points: x, y</label>
          <textarea id="scatterInput" rows="5">0,1
1,2.1
2,2.8
3,4.4
4,5.2
5,7.1</textarea>
        </section>

        <section class="control-section mode-fields" data-fields="bar">
          <label for="barInput">Bars: label, value, color</label>
          <textarea id="barInput" rows="5">Algebra,86,#1f9bd1
Mechanics,74,#f97316
Circuits,92,#16a34a
Optics,68,#a855f7</textarea>
        </section>

        <section class="control-section mode-fields" data-fields="polar">
          <label for="polarInput">r(θ)</label>
          <input id="polarInput" value="4 * sin(3*theta)" />
          <div class="range-grid">
            <label>
              θ min
              <input id="thetaMin" type="number" value="0" step="0.5" />
            </label>
            <label>
              θ max
              <input id="thetaMax" type="number" value="6.28" step="0.5" />
            </label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="semilog">
          <label for="semilogInput">Equation y=f(x) (Log Y)</label>
          <input id="semilogInput" value="10^x" />
          <div class="range-grid">
            <label>
              x min
              <input id="semiXMin" type="number" value="-2" step="0.5" />
            </label>
            <label>
              x max
              <input id="semiXMax" type="number" value="3" step="0.5" />
            </label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="complex">
          <label for="complexInput">Complex Expressions (Argand Diagram)</label>
          <textarea id="complexInput" rows="5">z1 = 3 + 4i
z2 = 2 * exp(i * pi / 3)
          </textarea>
        </section>

        <section class="control-section mode-fields" data-fields="surface">
          <label for="surfaceInput">3D Equation</label>
          <input id="surfaceInput" value="x^2 + y^2 - z^2 = 0" placeholder="e.g. z = sin(x)*cos(y) or x^2+y^2-z^2=0" />
          <div class="range-grid">
            <label>
              x min
              <input id="surfXMin" type="number" value="-5" step="1" />
            </label>
            <label>
              x max
              <input id="surfXMax" type="number" value="5" step="1" />
            </label>
            <label>
              y min
              <input id="surfYMin" type="number" value="-5" step="1" />
            </label>
            <label>
              y max
              <input id="surfYMax" type="number" value="5" step="1" />
            </label>
            <label>
              z min
              <input id="surfZMin" type="number" value="-5" step="1" />
            </label>
            <label>
              z max
              <input id="surfZMax" type="number" value="5" step="1" />
            </label>
          </div>
          <button type="button" id="gravityWellBtn" class="ghost-button" style="width:100%; margin-top:8px; border:1px solid var(--line);">
            🚀 Spacetime Gravity Well Preset
          </button>
        </section>

        <section class="control-section mode-fields" data-fields="calculus">
          <label for="calculusInput">Function y = f(x)</label>
          <input id="calculusInput" value="0.5 * x^3 - 2 * x" />
          <label for="calculusAction">Action</label>
          <select id="calculusAction" class="input-field" style="width:100%; margin-bottom:8px; padding:6px; border-radius:4px; border:1px solid var(--line); background:var(--surface); color:var(--ink);">
            <option value="derivative">Plot Derivative (y')</option>
            <option value="tangent">Tangent Line</option>
            <option value="integral">Area Under Curve (Integral)</option>
          </select>
          <div class="range-grid">
            <label>
              x min
              <input id="calcXMin" type="number" value="-5" step="0.5" />
            </label>
            <label>
              x max
              <input id="calcXMax" type="number" value="5" step="0.5" />
            </label>
          </div>
          <div class="range-grid" id="calcTargetGrid">
            <label>
              Target x (Tangent)
              <input id="calcTargetX" type="number" value="1" step="0.5" />
            </label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="matrix">
          <label for="matrixInput">Matrix Transforms (Comma separated rows)</label>
          <textarea id="matrixInput" rows="3">1, 0.5
-0.5, 1</textarea>
          <label for="matrixVectorInput">Points / Vectors to Transform</label>
          <textarea id="matrixVectorInput" rows="4">1, 1, #ef4444
-1, 1, #1f9bd1
-1, -1, #f97316
1, -1, #16a34a</textarea>
        </section>

        <section class="control-section mode-fields" data-fields="bode">
          <label for="bodeInput">Transfer Function H(s) or G(s)</label>
          <input id="bodeInput" value="100 / (s^2 + 10*s + 100)" placeholder="e.g. 10 / (s + 2)" />
          <div class="range-grid">
            <label>
              ω min (rad/s)
              <input id="bodeWMin" type="number" value="0.1" step="0.1" />
            </label>
            <label>
              ω max (rad/s)
              <input id="bodeWMax" type="number" value="1000" step="10" />
            </label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="transient">
          <label for="transientInput">Transfer Function G(s)</label>
          <input id="transientInput" value="25 / (s^2 + 2*s + 25)" placeholder="e.g. 1 / (s + 1)" />
          <label for="transientAction">Input Type</label>
          <select id="transientAction" class="input-field" style="width:100%; margin-bottom:8px; padding:6px; border-radius:4px; border:1px solid var(--line); background:var(--surface); color:var(--ink);">
            <option value="step">Step Response (1/s)</option>
            <option value="impulse">Impulse Response (1)</option>
          </select>
          <div class="range-grid">
            <label>
              t max (sec)
              <input id="transientTMax" type="number" value="5" step="0.5" />
            </label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="digital">
          <label for="digitalInput">Digital Sequences (Name: Sequence, Color)</label>
          <textarea id="digitalInput" rows="6">Clock: 101010101010, #64748b
Data: 011001001110, #38bdf8
Enable: 000111111000, #f97316
Output: 001001001010, #16a34a</textarea>
        </section>

        <section class="control-section mode-fields" data-fields="kinematics">
          <div class="range-grid">
            <label>Velocity (m/s) <input id="kinV0" type="number" value="50" step="1" /></label>
            <label>Angle (deg) <input id="kinAngle" type="number" value="45" step="1" /></label>
            <label>Gravity (m/s²) <input id="kinGravity" type="number" value="9.81" step="0.1" /></label>
            <label>Height (m) <input id="kinH0" type="number" value="0" step="1" /></label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="thermo">
          <label for="thermoInput">Thermodynamic Cycle (P, V)</label>
          <textarea id="thermoInput" rows="5">100, 1
100, 5
50, 5
50, 1</textarea>
          <label style="font-size:0.8rem; color:var(--muted)">Enter P (kPa), V (m³) points line by line. The cycle will automatically close.</label>
        </section>

        <section class="control-section mode-fields" data-fields="mechanics">
          <div class="range-grid">
            <label>σx (MPa) <input id="mechSigX" type="number" value="50" step="5" /></label>
            <label>σy (MPa) <input id="mechSigY" type="number" value="-10" step="5" /></label>
            <label>τxy (MPa) <input id="mechTau" type="number" value="40" step="5" /></label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="complexity">
          <label>Compare Big-O Complexities</label>
          <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; font-size:0.9rem;">
            <label style="display:flex; flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="compO1" checked /> O(1)</label>
            <label style="display:flex; flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="compOLog" checked /> O(log n)</label>
            <label style="display:flex; flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="compON" checked /> O(n)</label>
            <label style="display:flex; flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="compONLog" checked /> O(n log n)</label>
            <label style="display:flex; flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="compON2" checked /> O(n²)</label>
            <label style="display:flex; flex-direction:row; align-items:center; gap:5px;"><input type="checkbox" id="compO2N" /> O(2ⁿ)</label>
          </div>
          <div class="range-grid">
            <label>Max Elements (N) <input id="compMaxN" type="number" value="50" step="10" /></label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="ai">
          <label for="aiType">Visualization Type</label>
          <select id="aiType" class="input-field" style="width:100%; margin-bottom:8px; padding:6px; border-radius:4px; border:1px solid var(--line); background:var(--surface); color:var(--ink);">
            <option value="relu">ReLU Activation</option>
            <option value="sigmoid">Sigmoid Activation</option>
            <option value="tanh">Tanh Activation</option>
            <option value="gradient">Gradient Descent (1D)</option>
          </select>
          <div class="range-grid">
            <label>Learning Rate (α) <input id="aiLR" type="number" value="0.1" step="0.01" /></label>
            <label>Start Weight (w₀) <input id="aiW0" type="number" value="-8" step="1" /></label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="elliptical">
          <div class="range-grid">
            <label>Eccentricity (e) <input id="orbitE" type="number" value="0.6" step="0.05" min="0" max="0.99" /></label>
            <label>Semi-major Axis <input id="orbitA" type="number" value="10" step="1" /></label>
          </div>
        </section>

        <section class="control-section mode-fields" data-fields="hohmann">
          <div class="range-grid">
            <label>Inner Radius (r₁) <input id="orbitR1" type="number" value="4" step="1" /></label>
            <label>Outer Radius (r₂) <input id="orbitR2" type="number" value="12" step="1" /></label>
          </div>
        </section>
        <div class="button-row">
          <button class="primary-button" id="plotButton" type="button">
            Plot graph
          </button>
          <button class="ghost-button" id="resetButton" type="button">Reset</button>
        </div>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p id="modeEyebrow">Mathematics / Equation</p>
            <h2 id="graphTitle">y = sin(x) + 0.35*x</h2>
          </div>
          <div class="topbar-actions">
            <div class="status-strip" id="statusStrip"></div>
            <button class="install-button" id="installButton" type="button" hidden>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M12 3v8m0 0 3-3m-3 3-3-3M6 13v5h12v-5"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
              </svg>
              <span>Install</span>
            </button>
          </div>
        </header>

        <section class="plot-area">
          <div class="plot-frame">
            <canvas id="plotCanvas" aria-label="Generated graph"></canvas>
            <div id="plotlyDiv" style="display:none; width:100%; height:100%;"></div>
            <div class="canvas-error" id="canvasError" hidden></div>
          </div>
          <div class="legend" id="legend"></div>
          <div class="cursor-panel">
            <div class="cursor-meta">
              <span>Cursor inspector</span>
              <strong id="cursorValue">No graph point selected</strong>
            </div>
            <input
              id="cursorSlider"
              type="range"
              min="0"
              max="0"
              value="0"
              step="1"
              aria-label="Graph cursor position"
            />
          </div>
        </section>
      </section>

      <aside class="explain-panel">
        <section>
          <div class="section-heading">
            <h3>Term Explanation</h3>
            <span id="termCount">0 terms</span>
          </div>
          <div class="term-list" id="termList"></div>
        </section>

        <section>
          <div class="section-heading">
            <h3>Indicators</h3>
            <span>visual</span>
          </div>
          <div class="indicator-list" id="indicatorList"></div>
        </section>

        <section>
          <div class="section-heading">
            <h3>History</h3>
            <button class="mini-button" id="clearHistoryButton" type="button">
              Clear
            </button>
          </div>
          <div class="history-list" id="historyList"></div>
        </section>

        <section>
          <div class="section-heading">
            <h3>Examples</h3>
            <span id="exampleStream">math</span>
          </div>
          <div class="example-list" id="exampleList"></div>
        </section>
      </aside>
    </main>

    <script src="math.min.js"></script>
    <script src="app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js');
        });
      }
    </script>
  </body>
</html>
